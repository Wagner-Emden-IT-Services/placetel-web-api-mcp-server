name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance + OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: npm aktualisieren (OIDC Trusted Publishing benoetigt npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Abhaengigkeiten installieren
        run: npm ci

      - name: Build
        run: npm run build

      # Kein NPM_TOKEN noetig: Authentifizierung laeuft ueber OIDC Trusted Publishing.
      - name: Publish to npm
        run: npm publish --provenance --access public
